name: PR Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_LINE_MIN: "75"
  COVERAGE_BRANCH_MIN: "33"

jobs:
  promise-tests:
    name: Build and run promise tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-20 lcov
          for tool in clang clang++ clang-format clang-tidy clangd lld llvm-ar llvm-ranlib llvm-nm llvm-objdump llvm-objcopy llvm-strip llvm-readelf llvm-readobj llvm-size llvm-cov llvm-profdata llvm-symbolizer; do
              if [ -f "/usr/bin/${tool}-20" ]; then
                  update-alternatives --install /usr/bin/$tool $tool /usr/bin/${tool}-20 100
              fi
          done

      - name: Configure Debug with coverage
        run: >-
          cmake
          -S .
          -B build
          -G Ninja
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=Debug
          -DJSPROCPP_BUILD_TESTS=ON
          -DCMAKE_CXX_FLAGS="-O0 -fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"
          -DCMAKE_SHARED_LINKER_FLAGS="-fprofile-instr-generate"

      - name: Build tests
        run: cmake --build build --target JSProCpp_test --config Debug

      - name: Run tests
        timeout-minutes: 1
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/build/coverage/%p-%m.profraw
        run: |
          set -euo pipefail
          mkdir -p build/coverage
          ctest --test-dir build --output-on-failure

      - name: Generate Coverage report
        id: coverage
        run: |
          set -euo pipefail
          mkdir -p coverage/html
          LLVM_COV_IGNORE_REGEX='(^|/)(test/|build/|_deps/|\.venv/)'
          shopt -s nullglob
          PROFILES=(build/coverage/*.profraw)
          if [ ${#PROFILES[@]} -eq 0 ]; then
            echo "No LLVM profile files found in build/coverage"
            echo "Expected LLVM_PROFILE_FILE=${{ github.workspace }}/build/coverage/%p-%m.profraw"
            exit 1
          fi
          TEST_BIN="$(find build -type f -name JSProCpp_test | head -n 1)"
          if [ -z "$TEST_BIN" ]; then
            echo "Unable to locate JSProCpp_test binary in build directory"
            exit 1
          fi

          llvm-profdata merge -sparse "${PROFILES[@]}" -o coverage/coverage.profdata

          llvm-cov export \
            "$TEST_BIN" \
            -instr-profile=coverage/coverage.profdata \
            -ignore-filename-regex="$LLVM_COV_IGNORE_REGEX" \
            -format=lcov \
            > coverage/coverage.lcov

          awk -v ROOT="$GITHUB_WORKSPACE" '
            # Merge LCOV records across template instantiations while keeping
            # coverage limited to project sources (include/ and src/).
            /^SF:/ {
              sf = substr($0, 4)
              in_scope = (index(sf, ROOT "/include/") == 1 || index(sf, ROOT "/src/") == 1)
              next
            }
            /^DA:/ {
              if (!in_scope) {
                next
              }
              split(substr($0, 4), a, ",")
              line = a[1]
              hits = a[2] + 0
              # Key by file+line so repeated DA entries collapse into one line metric.
              lk = sf SUBSEP line
              files[sf] = 1
              line_hits[lk] += hits
              next
            }
            /^BRDA:/ {
              if (!in_scope) {
                next
              }
              split(substr($0, 6), a, ",")
              line = a[1]
              branch = a[3]
              taken = a[4]
              if (taken == "-") {
                # Skip non-evaluable branches.
                next
              }
              # genhtml requires line coverage on any line with branch coverage.
              # Ensure a DA entry exists even if llvm-cov omitted it for this line.
              lk = sf SUBSEP line
              if (!(lk in line_hits)) {
                line_hits[lk] = 0
              }
              # Key by file+line+branch index to merge duplicated branch records.
              bk = sf SUBSEP line SUBSEP branch
              files[sf] = 1
              branch_hits[bk] += (taken + 0)
              next
            }
            END {
              for (sf in files) {
                print "SF:" sf

                lf = lh = 0
                for (k in line_hits) {
                  split(k, a, SUBSEP)
                  if (a[1] == sf) {
                    line = a[2]
                    hits = line_hits[k]
                    printf("DA:%s,%d\n", line, hits)
                    lf++
                    if (hits > 0) {
                      lh++
                    }
                  }
                }

                brf = brh = 0
                for (k in branch_hits) {
                  split(k, a, SUBSEP)
                  if (a[1] == sf) {
                    line = a[2]
                    branch = a[3]
                    taken = branch_hits[k]
                    printf("BRDA:%s,0,%s,%d\n", line, branch, taken)
                    brf++
                    if (taken > 0) {
                      brh++
                    }
                  }
                }

                printf("LF:%d\n", lf)
                printf("LH:%d\n", lh)
                printf("BRF:%d\n", brf)
                printf("BRH:%d\n", brh)
                print "end_of_record"
              }
            }
          ' coverage/coverage.lcov > coverage/coverage.merged.lcov

          genhtml \
            coverage/coverage.merged.lcov \
            --output-directory coverage/html \
            --branch-coverage \
            --legend \
            --title "JSProCpp PR Coverage" \
            --prefix "$GITHUB_WORKSPACE" \
            --ignore-errors source

          llvm-cov show \
            "$TEST_BIN" \
            -instr-profile=coverage/coverage.profdata \
            -ignore-filename-regex="$LLVM_COV_IGNORE_REGEX" \
            --show-line-counts-or-regions \
            --show-branches=count \
            --format=text \
            > coverage/llvm-cov-show.txt

          llvm-cov report \
            "$TEST_BIN" \
            -instr-profile=coverage/coverage.profdata \
            -ignore-filename-regex="$LLVM_COV_IGNORE_REGEX" \
            > coverage/llvm-cov-summary.txt

          awk '
            # Build a compact summary from merged LCOV counters.
            /^LF:/ { lt += substr($0, 4) + 0 }
            /^LH:/ { lh += substr($0, 4) + 0 }
            /^BRF:/ { bt += substr($0, 5) + 0 }
            /^BRH:/ { bh += substr($0, 5) + 0 }
            END {
              lp = (lt > 0) ? (100.0 * lh / lt) : 0
              bp = (bt > 0) ? (100.0 * bh / bt) : 0
              printf("lines: %.2f%% (%d/%d)\n", lp, lh, lt)
              printf("branches: %.2f%% (%d/%d)\n", bp, bh, bt)
            }
          ' coverage/coverage.merged.lcov > coverage/summary.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promise-coverage
          if-no-files-found: error
          path: |
            coverage/*

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.lcov
          fail_ci_if_error: false

  deploy-coverage:
    name: Deploy PR Coverage to GitHub Pages
    needs: promise-tests
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
      pull-requests: write

    defaults:
      run:
        shell: bash

    steps:
      # Download the coverage HTML generated earlier
      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: promise-coverage
          path: coverage

      # Move into a PR-specific folder
      - name: Prepare PR folder
        run: |
          set -euo pipefail
          mkdir -p public/pr-${{ github.event.pull_request.number }}
          cp -r coverage/html/* public/pr-${{ github.event.pull_request.number }}/

      # Upload to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: public

      # Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Extract coverage values
        id: coverage-values
        run: |
          set -euo pipefail
          LINE=$(grep '^lines:' coverage/summary.txt | awk '{print $2}')
          BRANCH=$(grep '^branches:' coverage/summary.txt | awk '{print $2}')
          if [ -z "$LINE" ] || [ -z "$BRANCH" ]; then
            echo "Unable to parse merged coverage from coverage/summary.txt"
            cat coverage/summary.txt
            exit 1
          fi
          echo "line=$LINE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Comment PR with coverage link
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          recreate: true
          message: |
            📊 **Coverage report for this PR**
            👉 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/index.html

            **Actual coverage**
            - Line coverage: ${{ steps.coverage-values.outputs.line }}
            - Branch coverage: ${{ steps.coverage-values.outputs.branch }}

  enforce-coverage:
    name: Enforce Coverage Thresholds
    needs: promise-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bc

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: promise-coverage
          path: coverage

      - name: Check coverage thresholds
        run: |
          set -euo pipefail
          LINE=$(grep '^lines:' coverage/summary.txt | awk '{print $2}' | tr -d '%')
          BRANCH=$(grep '^branches:' coverage/summary.txt | awk '{print $2}' | tr -d '%')
          if [ -z "$LINE" ] || [ -z "$BRANCH" ]; then
            echo "Unable to parse merged coverage from coverage/summary.txt"
            cat coverage/summary.txt
            exit 1
          fi

          echo "Detected line coverage:    $LINE%"
          echo "Detected branch coverage:  $BRANCH%"
          echo "Required line coverage:    $COVERAGE_LINE_MIN%"
          echo "Required branch coverage:  $COVERAGE_BRANCH_MIN%"
          echo ""

          FAILED=0

          if (( $(echo "$LINE < $COVERAGE_LINE_MIN" | bc -l) )); then
            echo "❌ Line coverage too low: $LINE% < $COVERAGE_LINE_MIN%"
            FAILED=1
          else
            echo "✅ Line coverage OK"
          fi

          if (( $(echo "$BRANCH < $COVERAGE_BRANCH_MIN" | bc -l) )); then
            echo "❌ Branch coverage too low: $BRANCH% < $COVERAGE_BRANCH_MIN%"
            FAILED=1
          else
            echo "✅ Branch coverage OK"
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "🚨 Coverage thresholds NOT met"
            exit 1
          fi

          echo ""
          echo "🎉 Coverage thresholds met successfully"

  linux-release-gcc:
    name: Linux Release with gcc-14
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-14 g++-14

      - name: Configure Release
        run: >-
          cmake
          -S .
          -B build-release
          -G Ninja
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14
          -DCMAKE_BUILD_TYPE=Release
          -DJSPROCPP_BUILD_TESTS=OFF

      - name: Build release library
        run: cmake --build build-release --target jsprocpp --config Release

      - name: Collect release library artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find build-release -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) -print0 | while IFS= read -r -d '' lib; do
            cp "$lib" release-artifacts/
          done
          test -n "$(ls -A release-artifacts)"

      - name: Upload release library artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promise-release-linux-gcc
          path: release-artifacts/

  linux-release-clang:
    name: Linux Release with clang
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-20
          for tool in clang clang++ clang-format clang-tidy clangd lld llvm-ar llvm-ranlib llvm-nm llvm-objdump llvm-objcopy llvm-strip llvm-readelf llvm-readobj llvm-size llvm-cov llvm-profdata llvm-symbolizer; do
              if [ -f "/usr/bin/${tool}-20" ]; then
                  update-alternatives --install /usr/bin/$tool $tool /usr/bin/${tool}-20 100
              fi
          done

      - name: Configure Release
        run: >-
          cmake
          -S .
          -B build-release
          -G Ninja
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=Release
          -DJSPROCPP_BUILD_TESTS=OFF

      - name: Build release library
        run: cmake --build build-release --target jsprocpp --config Release

      - name: Collect release library artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find build-release -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) -print0 | while IFS= read -r -d '' lib; do
            cp "$lib" release-artifacts/
          done
          test -n "$(ls -A release-artifacts)"

      - name: Upload release library artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promise-release-linux-clang
          path: release-artifacts/

  windows-release-clang-cl:
    name: Windows Release with clang-cl
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Ninja and LLVM
        run: |
          choco install -y ninja
          choco install -y llvm
        shell: powershell

      - name: Verify clang-cl
        run: clang-cl --version

      - name: Configure Windows Release with clang-cl
        run: |
          cmake -S . -B build-windows -G Ninja ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DJSPROCPP_BUILD_TESTS=OFF
        shell: cmd

      - name: Build Windows release library
        run: cmake --build build-windows --config Release --target jsprocpp
        shell: cmd

      - name: Collect Windows release artifacts
        run: |
          mkdir -p release-artifacts-windows
          for /r build-windows %%f in (*.lib *.dll *.a *.so) do copy "%%f" release-artifacts-windows\
          if not exist release-artifacts-windows\ ( exit 1 )
        shell: cmd

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promise-release-windows-clang-cl
          path: release-artifacts-windows/

  windows-release-msvc:
    name: Windows Release with cl.exe (MSVC)
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Ninja
        run: choco install -y ninja
        shell: powershell

      - name: Configure Windows Release with cl.exe (Ninja + MSVC)
        shell: cmd
        run: |
          rem find Visual Studio installation path
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo Visual Studio not found
            exit /b 1
          )
          rem initialize MSVC environment for x64
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" x64
          rem configure with Ninja using MSVC toolchain
          cmake -S . -B build-msvc -G "Ninja" ^
            -DCMAKE_C_COMPILER=cl.exe ^
            -DCMAKE_CXX_COMPILER=cl.exe ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DJSPROCPP_BUILD_TESTS=OFF

      - name: Build Windows release library
        shell: cmd
        run: |
          rem locate Visual Studio again (same as above)
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build build-msvc --config Release --target jsprocpp

      - name: Collect Windows release artifacts
        run: |
          mkdir -p release-artifacts-msvc
          for /r build-msvc %%f in (*.lib *.dll *.a *.so) do copy "%%f" release-artifacts-msvc\
          if not exist release-artifacts-msvc\ ( exit 1 )
        shell: cmd

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promise-release-windows-msvc
          path: release-artifacts-msvc/
